# alembic.ini — Alembic migration tool configuration for NexoBank
# The actual database URL is read from the DATABASE_URL environment variable
# inside alembic/env.py; the value here is a fallback placeholder only.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for %%(year)d etc. in file_template
timezone = UTC

# Max character length of the "slug" in the filename
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command (default false)
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file.
sourceless = false

# Version path separator — use os for platform default, or specify manually
version_path_separator = os

# The default URL; overridden at runtime by env.py reading DATABASE_URL env var.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/nexobank

[post_write_hooks]
# Automatically format generated migration files with ruff
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/.venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
